version: "3.8"

services:
  api:
    build: .
    container_name: heart-disease-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - MODEL_PATH=models/homl_heart_model.keras
      - SCALER_PATH=models/scaler.pkl
      - MC_SAMPLES=100
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dashboard:
    build: .
    container_name: heart-disease-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    command: ["streamlit", "run", "src/dashboard.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
